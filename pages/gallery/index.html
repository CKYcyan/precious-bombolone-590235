<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>藝廊 — 台灣海蛞蝓紀錄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .gallery-item {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--color-border);
      cursor: zoom-in;
      aspect-ratio: 3/2;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
      display: block;
    }
    .gallery-item:hover img { transform: scale(1.05); }
    .gallery-item__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 50%);
      opacity: 0;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 14px;
    }
    .gallery-item:hover .gallery-item__overlay { opacity: 1; }
    .gallery-item__name {
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      line-height: 1.3;
    }
    .gallery-item__meta {
      color: rgba(255,255,255,0.75);
      font-size: 0.75rem;
      margin-top: 3px;
    }

    /* 篩選列 */
    .filter-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 28px;
    }

    @media (max-width: 1024px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px)  { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }

    /* Lightbox */
    .lb-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      cursor: zoom-out;
      animation: lbFadeIn 0.2s ease;
    }
    @keyframes lbFadeIn { from { opacity:0; } to { opacity:1; } }
    .lb-overlay img {
      max-width: 100%; max-height: 90vh;
      object-fit: contain;
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      cursor: default;
      animation: lbZoomIn 0.2s ease;
    }
    @keyframes lbZoomIn { from { transform: scale(0.92); opacity:0; } to { transform: scale(1); opacity:1; } }
    .lb-close {
      position: fixed; top: 16px; right: 20px;
      color: #fff; font-size: 2rem; cursor: pointer;
      line-height: 1; opacity: 0.8; transition: opacity 0.15s;
    }
    .lb-close:hover { opacity: 1; }
    .lb-caption {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.85); font-size: 0.88rem;
      background: rgba(0,0,0,0.45); padding: 6px 16px;
      border-radius: 99px; white-space: nowrap; max-width: 90vw;
      overflow: hidden; text-overflow: ellipsis;
    }
    .lb-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      color: #fff; font-size: 2rem; cursor: pointer;
      opacity: 0.6; transition: opacity 0.15s; user-select: none;
      padding: 12px;
    }
    .lb-nav:hover { opacity: 1; }
    .lb-prev { left: 8px; }
    .lb-next { right: 8px; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="main-content">
    <div class="page-hero">
      <div class="container">
        <div class="page-hero__label">Gallery</div>
        <h1 class="page-hero__title">藝廊</h1>
        <p class="page-hero__subtitle">精選台灣海蛞蝓攝影作品</p>
      </div>
    </div>

    <section class="section">
      <div class="container">

        <!-- 篩選 -->
        <div class="filter-row">
          <select id="filterSpecies" class="form-select" style="max-width:220px;">
            <option value="">所有物種</option>
          </select>
          <span id="countInfo" style="font-size:0.88rem; color:var(--color-text-muted); margin-left:auto;"></span>
        </div>

        <!-- 圖片網格 -->
        <div class="gallery-grid" id="galleryGrid">
          <div class="spinner" style="grid-column:1/-1;"></div>
        </div>

        <div id="emptyState" class="empty-state" style="display:none;">
          <div class="empty-state__icon">🖼</div>
          <p class="empty-state__text">尚無照片</p>
        </div>

      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.min.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/template.js"></script>
  <script src="../../js/nav.js"></script>
  <script>
    let allPhotos = [];

    document.addEventListener('DOMContentLoaded', async () => {
      await loadGallery();
      document.getElementById('filterSpecies').addEventListener('change', filterGallery);
    });

    async function loadGallery() {
      const { data } = await supabase
        .from('gallery')
        .select('*, species(id, name_zh, name_sci)')
        .order('sort_order', { ascending: false })
        .order('created_at', { ascending: false });

      allPhotos = data || [];
      populateSpeciesFilter();
      renderGallery(allPhotos);
    }

    function populateSpeciesFilter() {
      const sel = document.getElementById('filterSpecies');
      const seen = new Set();
      allPhotos.forEach(p => {
        if (p.species && !seen.has(p.species.id)) {
          seen.add(p.species.id);
          const opt = document.createElement('option');
          opt.value = p.species.id;
          opt.textContent = p.species.name_zh;
          sel.appendChild(opt);
        }
      });
    }

    function filterGallery() {
      const speciesId = document.getElementById('filterSpecies').value;
      const filtered  = speciesId
        ? allPhotos.filter(p => p.species?.id == speciesId)
        : allPhotos;
      renderGallery(filtered);
    }

    function renderGallery(photos) {
      const grid  = document.getElementById('galleryGrid');
      const empty = document.getElementById('emptyState');
      document.getElementById('countInfo').textContent = `共 ${photos.length} 張`;

      if (!photos.length) {
        grid.innerHTML  = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      grid.innerHTML = photos.map((p, i) => `
        <div class="gallery-item" onclick="openLightbox(${i})">
          <img src="${p.image_url}" alt="${p.species?.name_zh || ''}"
               onerror="this.onerror=null; this.style.background='var(--color-border)'">
          <div class="gallery-item__overlay">
            ${p.species ? `<a href="../species/species.html?id=${p.species.id}" class="gallery-item__name" onclick="event.stopPropagation()">${p.species.name_zh}</a>` : ''}
            <div class="gallery-item__meta">${[p.photographer, p.location].filter(Boolean).join(' · ')}</div>
          </div>
        </div>`).join('');

      // 更新 lightbox 對應的照片清單
      _lbPhotos = photos;
    }

    /* ── Lightbox ── */
    let _lbPhotos  = [];
    let _lbIndex   = 0;

    function openLightbox(index) {
      _lbIndex = index;
      renderLightbox();
    }

    function renderLightbox() {
      const p       = _lbPhotos[_lbIndex];
      const caption = [p.species?.name_zh, p.photographer, p.location].filter(Boolean).join(' · ');

      // 移除舊的
      closeLightbox();

      const overlay = document.createElement('div');
      overlay.className = 'lb-overlay';
      overlay.id = 'lbOverlay';
      overlay.addEventListener('click', closeLightbox);

      overlay.innerHTML = `
        <span class="lb-close" onclick="closeLightbox()">✕</span>
        ${_lbPhotos.length > 1 ? `<span class="lb-nav lb-prev" onclick="event.stopPropagation(); lbMove(-1)">‹</span>` : ''}
        <img src="${p.image_url}" alt="${caption}" onclick="event.stopPropagation()">
        ${_lbPhotos.length > 1 ? `<span class="lb-nav lb-next" onclick="event.stopPropagation(); lbMove(1)">›</span>` : ''}
        ${caption ? `<div class="lb-caption">${caption}</div>` : ''}
      `;
      document.body.appendChild(overlay);
    }

    function lbMove(dir) {
      _lbIndex = (_lbIndex + dir + _lbPhotos.length) % _lbPhotos.length;
      renderLightbox();
    }

    function closeLightbox() {
      document.getElementById('lbOverlay')?.remove();
    }

    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('lbOverlay')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowLeft')  lbMove(-1);
      if (e.key === 'ArrowRight') lbMove(1);
    });
  </script>
</body>
</html>
