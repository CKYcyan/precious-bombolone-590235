<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 — 台灣海蛞蝓紀錄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <style>
    .article-hero {
      height: 420px;
      background: var(--color-dark);
      position: relative;
      overflow: hidden;
    }
    .article-hero__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.5;
    }
    .article-hero__overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 48px;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%);
    }
    .article-hero__content { max-width: 800px; }
    .article-hero__tags { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .article-hero__tag  {
      background: rgba(255,255,255,0.15);
      color: #fff;
      padding: 3px 12px;
      border-radius: 99px;
      font-size: 0.8rem;
      backdrop-filter: blur(4px);
    }
    .article-hero__title {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .article-hero__meta { color: rgba(255,255,255,0.75); font-size: 0.9rem; }

    /* 文章內容 */
    .article-body {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 24px;
    }
    .article-body h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-dark);
      margin: 36px 0 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--color-secondary);
    }
    .article-body h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--color-dark);
      margin: 24px 0 10px;
    }
    .article-body p {
      margin-bottom: 16px;
      line-height: 1.85;
      font-size: 1.02rem;
    }
    .article-body ul, .article-body ol {
      padding-left: 28px;
      margin-bottom: 16px;
      line-height: 1.85;
    }
    .article-body li { margin-bottom: 6px; }
    .article-body img {
      width: 100%;
      border-radius: var(--radius-md);
      margin: 24px 0;
    }
    .article-body em {
      font-style: italic;
      font-family: Georgia, serif;
    }
    .article-body blockquote {
      border-left: 4px solid var(--color-secondary);
      padding: 12px 20px;
      margin: 24px 0;
      background: rgba(42,157,143,0.06);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--color-text-muted);
      font-style: italic;
    }

    /* 相關文章 */
    .related-articles {
      border-top: 1px solid var(--color-border);
      padding-top: 48px;
      margin-top: 48px;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="main-content">

    <!-- 英雄區 -->
    <div class="article-hero" id="articleHero" style="display:none;">
      <img class="article-hero__img" id="heroCover" src="" alt="">
      <div class="article-hero__overlay">
        <div class="article-hero__content">
          <div class="article-hero__tags" id="heroTags"></div>
          <h1 class="article-hero__title" id="heroTitle"></h1>
          <div class="article-hero__meta" id="heroMeta"></div>
        </div>
      </div>
    </div>

    <!-- 無封面時的標題 -->
    <div class="page-hero" id="simplehero" style="display:none;">
      <div class="container">
        <div class="page-hero__label" id="simpleTags"></div>
        <h1 class="page-hero__title" id="simpleTitle"></h1>
        <p class="page-hero__subtitle" id="simpleMeta"></p>
      </div>
    </div>

    <!-- 文章內容 -->
    <div class="article-body">
      <div id="articleContent"><div class="spinner"></div></div>

      <!-- 相關文章 -->
      <div class="related-articles" id="relatedArticles" style="display:none;">
        <h3 style="font-size:1.1rem; font-weight:700; color:var(--color-dark); margin-bottom:20px;">相關文章</h3>
        <div class="grid grid--2" id="relatedList"></div>
      </div>

      <div style="margin-top:40px;">
        <a href="index.html" class="btn btn--outline">← 返回知識庫</a>
      </div>
    </div>

  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.min.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/template.js"></script>
  <script src="../../js/nav.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { window.location.href = 'index.html'; return; }
      await loadArticle(id);
    });

    async function loadArticle(id) {
      const { data, error } = await supabase
        .from('articles')
        .select('*, article_tags(tags(id, name))')
        .eq('id', id)
        .eq('published', true)
        .single();

      if (error || !data) {
        document.getElementById('articleContent').innerHTML =
          '<div class="empty-state"><p class="empty-state__text">找不到這篇文章</p></div>';
        return;
      }

      // 更新頁面標題
      document.title = `${data.title} — 台灣海蛞蝓紀錄`;

      const tags = data.article_tags?.map(at => at.tags).filter(Boolean) || [];
      const dateStr = data.published_at
        ? new Date(data.published_at).toLocaleDateString('zh-Hant', { year:'numeric', month:'long', day:'numeric' })
        : '';

      if (data.cover_image) {
        document.getElementById('articleHero').style.display = 'block';
        document.getElementById('heroCover').src = data.cover_image;
        document.getElementById('heroTitle').textContent = data.title;
        document.getElementById('heroMeta').textContent  = dateStr;
        document.getElementById('heroTags').innerHTML =
          tags.map(t => `<span class="article-hero__tag">${t.name}</span>`).join('');
      } else {
        document.getElementById('simplehero').style.display = 'block';
        document.getElementById('simpleTitle').textContent = data.title;
        document.getElementById('simpleMeta').textContent  = dateStr;
        document.getElementById('simpleTags').textContent  = tags.map(t => t.name).join(' · ');
      }

      document.getElementById('articleContent').innerHTML = data.content || '<p>（內容暫無）</p>';

      // 載入相關文章（同標籤）
      if (tags.length) {
        const tagIds = tags.map(t => t.id);
        const { data: related } = await supabase
          .from('articles')
          .select('id, title, cover_image, published_at, article_tags(tags(id))')
          .eq('published', true)
          .neq('id', id)
          .limit(4);

        const filtered = (related || []).filter(a =>
          a.article_tags?.some(at => tagIds.includes(at.tags?.id))
        ).slice(0, 2);

        if (filtered.length) {
          document.getElementById('relatedArticles').style.display = 'block';
          document.getElementById('relatedList').innerHTML = filtered.map(a => `
            <a href="article.html?id=${a.id}" class="card">
              <img class="card__image" src="${a.cover_image||''}" alt="${a.title}"
                   onerror="this.style.background='var(--color-border)'">
              <div class="card__body">
                <div class="card__meta">${a.published_at ? new Date(a.published_at).toLocaleDateString('zh-Hant') : ''}</div>
                <div class="card__title">${a.title}</div>
              </div>
            </a>`).join('');
        }
      }
    }
  </script>
</body>
</html>
